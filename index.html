<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GachiBass Radio ♂</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>GachiBass Radio ♂</h1>
        <p>Welcome to the Deep Dark Fantasy ♂</p>
        <div class="radio-embed">
            <div class="radio-controls">
                <button id="radio-btn" class="channel-btn">PLAY RADIO ♂</button>
                <audio id="radio-player" preload="none"></audio>
            </div>
        </div>
    </header>

    <main>
        <section id="media-section">
            <div id="media-grid" class="grid"></div>
        </section>
    </main>

    <div id="notification-container" class="notification-container"></div>

    <script src="js/content.js"></script>
</body>
</html>
