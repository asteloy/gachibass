<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GachiBass Radio ♂</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>GachiBass Radio ♂</h1>
        <p>Welcome to the Deep Dark Fantasy ♂</p>
        <div class="radio-embed">
            <iframe src="https://radio.gachibass.us.to/" frameborder="0" allow="autoplay"></iframe>
        </div>
    </header>

    <main>
        <section id="media-section">
            <div id="media-grid" class="grid"></div>
        </section>
    </main>

    <!-- Player Modal -->
    <div id="player-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h3 id="player-title">Gachi Player ♂</h3>
            <div id="player-container"></div>
        </div>
    </div>

    <script src="js/content.js"></script>
</body>
</html>
