<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GachiBass Radio ♂</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>GachiBass Radio ♂</h1>
        <p>Welcome to the Deep Dark Fantasy ♂</p>
        <div class="radio-embed">
            <audio id="radio-player" controls preload="none"></audio>
        </div>
    </header>

    <main>
        <section id="media-section">
            <div id="media-grid" class="grid"></div>
        </section>
    </main>

    <div id="hero-modal" class="modal" style="display:none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); overflow: auto;">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2 id="player-title"></h2>
            <div id="player-container">
                <div id="hero-description" style="color: #eee; line-height: 1.6; text-align: left; white-space: pre-wrap;"></div>
            </div>
        </div>
    </div>

    <script src="js/content.js"></script>
</body>
</html>
